name: Live Arbitrage Signaler

on:
  workflow_dispatch:
    inputs:
      target_payout_usd:
        description: "Gross payout target per outcome in USD"
        required: true
        default: "1000"
      min_profit_pct:
        description: "Minimum net arbitrage edge percentage"
        required: true
        default: "0.5"
      discovery_platforms:
        description: "Platforms to discover during the indexer stage"
        required: true
        default: "polymarket,kalshi,oddspapi"
      listener_platforms:
        description: "Live WebSocket listener platforms"
        required: true
        default: "polymarket,kalshi,oddspapi"
      oddspapi_bookmakers:
        description: "Bookmakers to include inside OddsPapi"
        required: true
        default: "pinnacle,1xbet"
      oddspapi_secret_name:
        description: "Exact GitHub secret name containing the OddsPapi key"
        required: true
        default: "ODDSPAPI_KEY"
      oddspapi_variable_name:
        description: "Optional exact GitHub variable name containing the OddsPapi key"
        required: false
        default: "ODDSPAPI_KEY"
      min_platforms:
        description: "Minimum distinct platforms required per alert"
        required: true
        default: "2"
      max_alerts_per_digest:
        description: "Maximum Telegram alerts per digest window"
        required: true
        default: "2"
      alert_digest_seconds:
        description: "Seconds between top-opportunity Telegram digests"
        required: true
        default: "60"
      alert_cooldown_seconds:
        description: "Seconds before the same leg combination can alert again"
        required: true
        default: "600"
      max_runtime_minutes:
        description: "Stop the live signaler cleanly after this many minutes"
        required: true
        default: "60"
      dry_run:
        description: "Log alerts without sending Telegram messages"
        required: true
        type: boolean
        default: false
concurrency:
  group: wc-arbbot-live-signaler
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  live-signaler:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    env:
      LOG_LEVEL: INFO
      ODDSPAPI_SELECTED_SECRET: ${{ secrets[inputs.oddspapi_secret_name] }}
      ODDSPAPI_SELECTED_VAR: ${{ vars[inputs.oddspapi_variable_name] }}
      ODDSPAPI_KEY: ${{ secrets.ODDSPAPI_KEY }}
      ODDSPAPI_API_KEY: ${{ secrets.ODDSPAPI_API_KEY }}
      ODDSPAPI_TOKEN: ${{ secrets.ODDSPAPI_TOKEN }}
      ODDSPAPI: ${{ secrets.ODDSPAPI }}
      OODSPAPI_KEY: ${{ secrets.OODSPAPI_KEY }}
      OODSPAPI_API_KEY: ${{ secrets.OODSPAPI_API_KEY }}
      ODDPAPI_KEY: ${{ secrets.ODDPAPI_KEY }}
      ODDS_PAPI_KEY: ${{ secrets.ODDS_PAPI_KEY }}
      ODDS_PAPI_API_KEY: ${{ secrets.ODDS_PAPI_API_KEY }}
      ODDS_PAPI_TOKEN: ${{ secrets.ODDS_PAPI_TOKEN }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      ODDSAPI_KEY: ${{ secrets.ODDSAPI_KEY }}
      THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
      ODDSPAPI_KEY_VAR: ${{ vars.ODDSPAPI_KEY }}
      ODDSPAPI_API_KEY_VAR: ${{ vars.ODDSPAPI_API_KEY }}
      ODDSPAPI_TOKEN_VAR: ${{ vars.ODDSPAPI_TOKEN }}
      ODDSPAPI_VAR: ${{ vars.ODDSPAPI }}
      OODSPAPI_KEY_VAR: ${{ vars.OODSPAPI_KEY }}
      OODSPAPI_API_KEY_VAR: ${{ vars.OODSPAPI_API_KEY }}
      ODDPAPI_KEY_VAR: ${{ vars.ODDPAPI_KEY }}
      ODDS_PAPI_KEY_VAR: ${{ vars.ODDS_PAPI_KEY }}
      ODDS_PAPI_API_KEY_VAR: ${{ vars.ODDS_PAPI_API_KEY }}
      ODDSAPI_KEY_VAR: ${{ vars.ODDSAPI_KEY }}
      TELEGRAM_BOT_KEY: ${{ secrets.TELEGRAM_BOT_KEY }}
      TELEGRAM_GROUP_ID: ${{ secrets.TELEGRAM_GROUP_ID }}
      KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
      KALSHI_ACCESS_KEY: ${{ secrets.KALSHI_ACCESS_KEY }}
      KALSHI_BEARER_TOKEN: ${{ secrets.KALSHI_BEARER_TOKEN }}
      KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
      AZURO_WS_URL: ${{ vars.AZURO_WS_URL || 'wss://dev-streams.onchainfeed.org/v1/streams/feed' }}
      AZURO_WS_SUBSCRIBE_PAYLOAD: ${{ vars.AZURO_WS_SUBSCRIBE_PAYLOAD }}
      POLYMARKET_WS_URL: ${{ vars.POLYMARKET_WS_URL || 'wss://ws-subscriptions-clob.polymarket.com/ws/market' }}
      KALSHI_WS_URL: ${{ vars.KALSHI_WS_URL || 'wss://api.elections.kalshi.com/trade-api/ws/v2' }}
      ODDSPAPI_WS_URL: ${{ vars.ODDSPAPI_WS_URL || 'wss://api.oddspapi.io/v4/ws' }}
      ODDSPAPI_BASE_URL: ${{ vars.ODDSPAPI_BASE_URL }}
      ODDSPAPI_TOURNAMENT_IDS: ${{ vars.ODDSPAPI_TOURNAMENT_IDS }}
      ODDSPAPI_TOURNAMENT_NAME: ${{ vars.ODDSPAPI_TOURNAMENT_NAME || 'FIFA World Cup' }}
      ODDSPAPI_BOOKMAKERS: ${{ inputs.oddspapi_bookmakers || vars.ODDSPAPI_BOOKMAKERS || 'pinnacle,1xbet' }}
      POLYMARKET_DISCOVERY_JSON: /app/seed/polymarket_world_cup.json
      KALSHI_DISCOVERY_JSON: /app/seed/kalshi_world_cup.json
      WC_ARBBOT_WINDOW_HOURS: ${{ vars.WC_ARBBOT_WINDOW_HOURS || '48' }}
      WC_ARBBOT_PLATFORMS: ${{ inputs.discovery_platforms || vars.WC_ARBBOT_PLATFORMS || 'polymarket,kalshi,oddspapi' }}
      SIGNALER_PLATFORMS: ${{ inputs.listener_platforms || vars.SIGNALER_PLATFORMS || 'polymarket,kalshi,oddspapi' }}
      SIGNAL_TARGET_PAYOUT_USD: ${{ inputs.target_payout_usd || vars.SIGNAL_TARGET_PAYOUT_USD || '1000' }}
      SIGNAL_MIN_PROFIT_PCT: ${{ inputs.min_profit_pct || vars.SIGNAL_MIN_PROFIT_PCT || '0.5' }}
      SIGNAL_MIN_PLATFORMS: ${{ inputs.min_platforms || vars.SIGNAL_MIN_PLATFORMS || '2' }}
      SIGNAL_MAX_ALERTS_PER_DIGEST: ${{ inputs.max_alerts_per_digest || vars.SIGNAL_MAX_ALERTS_PER_DIGEST || '2' }}
      SIGNAL_ALERT_DIGEST_SECONDS: ${{ inputs.alert_digest_seconds || vars.SIGNAL_ALERT_DIGEST_SECONDS || '60' }}
      SIGNAL_ALERT_COOLDOWN_SECONDS: ${{ inputs.alert_cooldown_seconds || vars.SIGNAL_ALERT_COOLDOWN_SECONDS || '600' }}
      SIGNAL_DRY_RUN: ${{ inputs.dry_run || vars.SIGNAL_DRY_RUN || 'false' }}
      SIGNAL_ALLOW_EMPTY_TAXONOMY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize OddsPapi key
        shell: bash
        run: |
          canonical=""
          for candidate in \
            "$ODDSPAPI_SELECTED_SECRET" \
            "$ODDSPAPI_SELECTED_VAR" \
            "$ODDSPAPI_KEY" \
            "$ODDSPAPI_API_KEY" \
            "$ODDSPAPI_TOKEN" \
            "$ODDSPAPI" \
            "$OODSPAPI_KEY" \
            "$OODSPAPI_API_KEY" \
            "$ODDPAPI_KEY" \
            "$ODDS_PAPI_KEY" \
            "$ODDS_PAPI_API_KEY" \
            "$ODDS_PAPI_TOKEN" \
            "$ODDS_API_KEY" \
            "$ODDSAPI_KEY" \
            "$THE_ODDS_API_KEY" \
            "$ODDSPAPI_KEY_VAR" \
            "$ODDSPAPI_API_KEY_VAR" \
            "$ODDSPAPI_TOKEN_VAR" \
            "$ODDSPAPI_VAR" \
            "$OODSPAPI_KEY_VAR" \
            "$OODSPAPI_API_KEY_VAR" \
            "$ODDPAPI_KEY_VAR" \
            "$ODDS_PAPI_KEY_VAR" \
            "$ODDS_PAPI_API_KEY_VAR" \
            "$ODDSAPI_KEY_VAR"; do
            if [ -n "$candidate" ]; then
              canonical="$candidate"
              break
            fi
          done
          {
            echo "ODDSPAPI_KEY=$canonical"
            echo "ODDSPAPI_API_KEY=$canonical"
          } >> "$GITHUB_ENV"

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0
          for name in TELEGRAM_BOT_KEY TELEGRAM_GROUP_ID; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing secret::$name is required in repository secrets"
              missing=1
            fi
          done
          if [ -z "$ODDSPAPI_KEY" ]; then
            echo "::warning title=Missing OddsPapi key::ODDSPAPI_KEY was not injected. Pinnacle and 1xBet coverage from OddsPapi will be unavailable until the secret name/value is fixed."
          else
            echo "OddsPapi key injected: yes"
          fi

          live_count=0
          IFS=',' read -ra listeners <<< "$SIGNALER_PLATFORMS"
          for raw in "${listeners[@]}"; do
            name="$(echo "$raw" | tr '[:upper:]' '[:lower:]' | xargs)"
            case "$name" in
              polymarket|azuro)
                live_count=$((live_count + 1))
                ;;
              oddspapi)
                if [ -n "$ODDSPAPI_KEY" ]; then
                  live_count=$((live_count + 1))
                else
                  echo "::warning title=OddsPapi unavailable::oddspapi is enabled, but no OddsPapi key was injected."
                fi
                ;;
              kalshi)
                live_count=$((live_count + 1))
                if [ -z "$KALSHI_BEARER_TOKEN" ] && [ -z "$KALSHI_API_KEY" ] && [ -z "$KALSHI_ACCESS_KEY" ]; then
                  echo "::notice title=Kalshi REST fallback::kalshi is enabled without WebSocket auth; public REST orderbook polling will be used."
                fi
                ;;
              esac
          done
          echo "Usable live platform count: $live_count"

          if [ -z "$KALSHI_BEARER_TOKEN" ] && [ -z "$KALSHI_API_KEY" ] && [ -z "$KALSHI_ACCESS_KEY" ]; then
            echo "::notice title=Missing Kalshi auth::Kalshi WebSocket auth is not configured. Kalshi REST polling will be used."
          else
            echo "Kalshi auth injected: yes"
          fi
          if [ "$live_count" -lt "$SIGNAL_MIN_PLATFORMS" ]; then
            echo "::error title=Not enough live platforms::${live_count} live platform(s) available, but SIGNAL_MIN_PLATFORMS=${SIGNAL_MIN_PLATFORMS}. With the current settings the bot cannot produce cross-platform arbitrage alerts."
            missing=1
          fi
          exit "$missing"

      - name: Build container
        run: docker build -t wc-arbbot:latest .

      - name: Run live signaler
        env:
          MAX_RUNTIME_MINUTES: ${{ inputs.max_runtime_minutes || vars.SIGNAL_MAX_RUNTIME_MINUTES || '60' }}
        run: |
          set +e
          timeout "${MAX_RUNTIME_MINUTES}m" docker run --rm \
            --name wc-arbbot-live \
            -e LOG_LEVEL \
            -e ODDSPAPI_KEY \
            -e ODDSPAPI_API_KEY \
            -e TELEGRAM_BOT_KEY \
            -e TELEGRAM_GROUP_ID \
            -e KALSHI_API_KEY \
            -e KALSHI_ACCESS_KEY \
            -e KALSHI_BEARER_TOKEN \
            -e KALSHI_PRIVATE_KEY \
            -e AZURO_WS_URL \
            -e AZURO_WS_SUBSCRIBE_PAYLOAD \
            -e POLYMARKET_WS_URL \
            -e KALSHI_WS_URL \
            -e ODDSPAPI_WS_URL \
            -e ODDSPAPI_BASE_URL \
            -e ODDSPAPI_TOURNAMENT_IDS \
            -e ODDSPAPI_TOURNAMENT_NAME \
            -e ODDSPAPI_BOOKMAKERS \
            -e POLYMARKET_DISCOVERY_JSON \
            -e KALSHI_DISCOVERY_JSON \
            -e WC_ARBBOT_WINDOW_HOURS \
            -e WC_ARBBOT_PLATFORMS \
            -e SIGNALER_PLATFORMS \
            -e SIGNAL_TARGET_PAYOUT_USD \
            -e SIGNAL_MIN_PROFIT_PCT \
            -e SIGNAL_MIN_PLATFORMS \
            -e SIGNAL_MAX_ALERTS_PER_DIGEST \
            -e SIGNAL_ALERT_DIGEST_SECONDS \
            -e SIGNAL_ALERT_COOLDOWN_SECONDS \
            -e SIGNAL_DRY_RUN \
            -e SIGNAL_ALLOW_EMPTY_TAXONOMY \
            wc-arbbot:latest
          status=$?
          if [ "$status" -eq 124 ]; then
            echo "Live signaler reached ${MAX_RUNTIME_MINUTES} minute runtime window; exiting cleanly."
            exit 0
          fi
          exit "$status"
